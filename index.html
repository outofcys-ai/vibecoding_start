<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI News</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="container">
    <h1>Latest AI News</h1>
    <div id="news-container"></div>

    <!-- 제휴 문의 폼 -->
    <div class="contact-section">
      <h2 class="section-title">제휴 문의</h2>
      <p class="section-subtitle">AI 뉴스 서비스와 함께할 파트너를 찾습니다.</p>
      
      <form action="https://formspree.io/f/xojkdbgp" method="POST" class="contact-form">
        <div class="form-group">
          <label for="email">이메일 주소</label>
          <input type="email" id="email" name="email" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" rows="5" placeholder="문의하실 내용을 입력해주세요." required></textarea>
        </div>
        <button type="submit" class="submit-button">문의 보내기</button>
      </form>
    </div>
  </div>

  <!-- 뉴스 상세 보기 모달 -->
  <div id="news-modal" class="modal">
    <div class="modal-content">
      <span class="close-button">&times;</span>
      <iframe id="news-frame" src="" frameborder="0"></iframe>
    </div>
  </div>

  <script type="text/javascript" src="main.js"></script>
</body>
</html>
